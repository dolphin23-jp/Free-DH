name: Clean lockfile transfer files

on:
  push:
    branches:
      - agent/fix-vercel-pnpm-lockfile
    paths:
      - .github/workflows/materialize-lockfile.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Remove transfer-only files
        shell: bash
        run: |
          rm -rf .lockparts
          rm -f .github/workflows/materialize-lockfile.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .lockparts .github/workflows/materialize-lockfile.yml
          git commit -m "Remove lockfile transfer files"
          git push
