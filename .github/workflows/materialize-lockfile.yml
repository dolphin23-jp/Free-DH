name: Materialize uploaded pnpm lockfile

on:
  push:
    branches:
      - agent/fix-vercel-pnpm-lockfile
    paths:
      - .github/workflows/materialize-lockfile.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Restore exact uploaded lockfile
        shell: bash
        run: |
          cat .lockparts/part-*.b64 | base64 --decode | gzip --decompress > pnpm-lock.yml
          echo "c7bed3e51bbee11d9d42e5f560dcfc38bc31fd76417c3c26f56ff217d5225b16  pnpm-lock.yml" | sha256sum --check -

      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add pnpm lockfile"
          git push
