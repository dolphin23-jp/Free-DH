name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        continue-on-error: true
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: T23 expanded boundary search
        run: pnpm exec vite build --config vite.t23-search2.config.ts --logLevel error && node .t23-search2-dist/search2.mjs > t23-search2.txt

      - name: Upload T23 search
        uses: actions/upload-artifact@v4
        with:
          name: t23-boundary-search
          path: t23-search2.txt

      - name: Build
        run: pnpm build
