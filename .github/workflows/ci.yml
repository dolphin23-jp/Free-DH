name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Simulator smoke test
        run: pnpm sim -- --runs 1

      - name: TypeScript diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm exec tsc --noEmit --pretty false 2>&1 | tee tsc-output.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-output
          path: tsc-output.txt

      - name: Fail on TypeScript errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - name: Vite build
        if: steps.typecheck.outputs.status == '0'
        run: pnpm vite build
