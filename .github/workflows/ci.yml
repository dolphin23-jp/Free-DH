name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        continue-on-error: true
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build standalone T23 probe
        run: pnpm exec vite build --config vite.t23-probe.config.ts --logLevel error

      - name: Upload T23 probe
        uses: actions/upload-artifact@v4
        with:
          name: t23-standalone-probe
          path: .t23-probe-dist/probe.mjs

      - name: Build
        run: pnpm build
