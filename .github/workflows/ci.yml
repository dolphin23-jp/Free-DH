name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Simulator smoke test
        run: pnpm sim -- --runs 1

      - name: T23 level 0 design suite
        run: pnpm sim -- --runs 1000

      - name: T23 abyss diagnostics
        run: pnpm exec vite build --config vite.t23.config.ts --logLevel error && node .t23-dist/diagnostic.mjs

      - name: Build
        run: pnpm build
