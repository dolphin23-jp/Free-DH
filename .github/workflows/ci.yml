name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: T23 level 0 report
        run: pnpm sim -- --runs 1000 > t23-level0-final.txt

      - name: T23 final abyss report
        run: pnpm exec vite build --config vite.t23-final.config.ts --logLevel error && node .t23-final-dist/diagnostic.mjs > t23-abyss-final.txt

      - name: Upload T23 final report
        uses: actions/upload-artifact@v4
        with:
          name: t23-final-report
          path: |
            t23-level0-final.txt
            t23-abyss-final.txt

      - name: Build
        run: pnpm build
